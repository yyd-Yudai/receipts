<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>家計簿 - レシート連携</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F5D50">
<style>
  :root{
    --bg:#F7F5EF;
    --surface:#FFFFFF;
    --ink:#2B2E2C;
    --ink-soft:#6B6F6A;
    --line:#E4E0D4;
    --accent:#2F5D50;
    --accent-soft:#DCE8E3;
    --warn:#A6453E;
    --warn-soft:#F3E2E0;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:"Hiragino Mincho ProN","Noto Serif JP",serif;
    font-weight:600;
    margin:0;
  }
  .num{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
  }
  header.topbar{
    position:sticky;top:0;z-index:10;
    background:var(--bg);
    padding:18px 20px 10px;
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  header.topbar h1{font-size:20px;letter-spacing:.04em;}
  header.topbar .sub{font-size:12px;color:var(--ink-soft);}

  main{padding:16px 16px 24px;max-width:520px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{font-size:15px;margin-bottom:10px;color:var(--ink);}

  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:11px 16px;
    font-size:14px;
    font-weight:600;
    transition:opacity .15s ease;
  }
  button:active{opacity:.75;}
  button.primary{background:var(--accent);color:#fff;width:100%;}
  button.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
  button.plain{background:var(--accent-soft);color:var(--accent);}
  button.danger{background:var(--warn-soft);color:var(--warn);}
  button:disabled{opacity:.45;cursor:not-allowed;}

  input[type=text],input[type=number],input[type=date],select{
    font-family:inherit;
    font-size:14px;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  label.field{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}

  .capture-box{
    border:1.5px dashed var(--line);
    border-radius:var(--radius);
    padding:28px 16px;
    text-align:center;
    color:var(--ink-soft);
    position:relative;
  }
  .capture-box img{max-width:100%;border-radius:10px;display:block;margin:0 auto;}
  .capture-box input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;
  }

  .items-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:4px;}
  table.items{width:100%;min-width:640px;border-collapse:collapse;}
  table.items th{font-size:11px;color:var(--ink-soft);text-align:left;font-weight:500;padding:4px 3px;white-space:nowrap;}
  table.items td{padding:5px 3px;vertical-align:top;}
  table.items input,table.items select{font-size:12.5px;padding:7px 6px;}
  .row-del{background:none;border:none;color:var(--warn);font-size:18px;padding:4px 4px;}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:76px;font-size:12px;color:var(--ink-soft);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:10px;background:var(--accent-soft);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent);border-radius:6px;}
  .bar-amount{width:76px;text-align:right;font-size:13px;flex-shrink:0;}

  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .month-nav button{background:var(--accent-soft);color:var(--accent);padding:6px 12px;}
  .month-nav .label{font-size:16px;font-weight:600;font-family:"Hiragino Mincho ProN","Noto Serif JP",serif;}

  .total-hero{text-align:center;padding:6px 0 14px;}
  .total-hero .amount{font-size:34px;font-weight:700;font-family:"Hiragino Mincho ProN","Noto Serif JP",serif;}
  .total-hero .caption{font-size:12px;color:var(--ink-soft);}
  .total-hero .compare{font-size:12px;margin-top:4px;font-weight:600;}
  .total-hero .compare.up{color:var(--warn);}
  .total-hero .compare.down{color:var(--accent);}
  .total-hero .compare.flat{color:var(--ink-soft);font-weight:400;}

  .seg-toggle{display:flex;gap:6px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:12px;}
  .seg-btn{flex:1;background:none;color:var(--ink-soft);padding:8px 4px;font-size:12px;border-radius:8px;}
  .seg-btn.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.06);}

  .donut-row{display:flex;align-items:center;gap:18px;margin-bottom:16px;}
  .donut-wrap{position:relative;flex-shrink:0;width:140px;height:140px;}
  .donut-wrap svg{display:block;}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
  .donut-center .amount{font-size:15px;font-weight:700;font-family:"Hiragino Mincho ProN","Noto Serif JP",serif;}
  .donut-center .caption{font-size:9px;color:var(--ink-soft);}
  .donut-legend{flex:1;min-width:0;}
  .donut-legend-row{display:flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 0;}
  .donut-legend-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .donut-legend-row .label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);}
  .donut-legend-row .pct{color:var(--ink-soft);flex-shrink:0;width:34px;text-align:right;}

  .entry{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .entry:last-child{border-bottom:none;}
  .entry .meta{color:var(--ink-soft);font-size:11px;margin-top:2px;}
  .entry .amount{font-weight:600;}
  .entry .del{color:var(--warn-soft);background:none;border:none;font-size:12px;padding:2px 6px;color:var(--warn);}

  nav.tabbar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);
    border-top:1px solid var(--line);
    display:flex;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
    z-index:20;
  }
  nav.tabbar button{
    flex:1;background:none;color:var(--ink-soft);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:11px;font-weight:500;padding:6px 2px;border-radius:10px;
  }
  nav.tabbar button .ic{font-size:19px;}
  nav.tabbar button.active{color:var(--accent);background:var(--accent-soft);}

  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:20px 0;}
  .spinner{
    width:22px;height:22px;border-radius:50%;
    border:3px solid var(--accent-soft);border-top-color:var(--accent);
    animation:spin .8s linear infinite;margin:14px auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{
    position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;
    font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:30;
  }
  .toast.show{opacity:1;}
  .add-row-btn{width:100%;margin-top:6px;background:var(--accent-soft);color:var(--accent);}

  /* ===== PC(幅900px以上)向けレイアウト: 左サイドバー + ダッシュボード2列 ===== */
  @media (min-width: 900px){
    body{
      display:grid;
      grid-template-columns: 232px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "nav header"
        "nav main";
      min-height:100vh;
      padding-bottom:0;
    }
    header.topbar{
      grid-area: header;
      position:static;
      padding:20px 36px;
    }
    main{
      grid-area: main;
      max-width:1100px;
      margin:0;
      padding:24px 36px 48px;
    }
    nav.tabbar{
      grid-area: nav;
      position:sticky;
      top:0;
      height:100vh;
      flex-direction:column;
      align-items:stretch;
      justify-content:flex-start;
      gap:4px;
      border-top:none;
      border-right:1px solid var(--line);
      padding:22px 14px;
    }
    nav.tabbar button{
      flex-direction:row;
      justify-content:flex-start;
      gap:10px;
      padding:11px 14px;
      font-size:13.5px;
      border-radius:10px;
    }
    nav.tabbar button .ic{font-size:18px;}

    #view-capture, #view-settings{max-width:640px;}

    #view-summary.active, #view-yearly.active{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      align-items:start;
    }
    #view-summary > .card, #view-yearly > .card{margin-bottom:0;}
    #view-yearly > .card:first-child{grid-column:1 / -1;}
  }

  .manage-major{border-bottom:1px solid var(--line);padding:8px 0;}
  .manage-major:last-child{border-bottom:none;}
  .manage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0;}
  .manage-row .name{font-size:13.5px;font-weight:600;}
  .manage-row.minor{padding-left:14px;}
  .manage-row.minor .name{font-size:12.5px;font-weight:400;color:var(--ink-soft);}
  .manage-actions{display:flex;gap:4px;flex-shrink:0;}
  .manage-actions button{padding:5px 9px;font-size:11px;font-weight:500;border-radius:7px;}
  .manage-add-minor{background:none;color:var(--accent);font-size:11.5px;padding:4px 0 4px 14px;text-align:left;width:auto;}
</style>
</head>
<body>

<header class="topbar">
  <h1>家計簿</h1>
  <span class="sub" id="userBadge"></span>
</header>

<main>

  <!-- 撮影タブ -->
  <section class="view active" id="view-capture">
    <div class="card">
      <h2>レシートを読み取る</h2>
      <div class="capture-box" id="captureBox">
        <div id="captureHint">タップして撮影 / 画像を選択</div>
        <img id="previewImg" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" capture="environment">
      </div>
      <button class="primary" id="ocrBtn" style="margin-top:12px;" disabled>解析する</button>
      <div id="ocrSpinner" style="display:none;"><div class="spinner"></div></div>
      <button class="ghost" id="manualEntryBtn" style="width:100%;margin-top:10px;">📝 レシートなしで入力する</button>
    </div>

    <div class="card" id="reviewCard" style="display:none;">
      <h2>内容を確認・修正</h2>
      <div id="mismatchBanner" style="display:none;background:var(--warn-soft);color:var(--warn);border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:10px;"></div>
      <label class="field">店舗名</label>
      <input type="text" id="storeInput">
      <div style="height:8px;"></div>
      <div class="items-scroll">
        <table class="items" id="itemsTable">
          <thead>
            <tr>
              <th style="width:16%">日付</th>
              <th style="width:26%">品目</th>
              <th style="width:14%">金額</th>
              <th style="width:22%">大分類</th>
              <th style="width:22%">小分類</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" id="addRowBtn">＋ 品目を追加</button>
      <button class="primary" id="saveBtn" style="margin-top:14px;">この内容で保存</button>
    </div>
  </section>

  <!-- 一覧・集計タブ -->
  <section class="view" id="view-summary">
    <div class="card">
      <div class="month-nav">
        <button id="prevMonth">＜</button>
        <span class="label" id="monthLabel"></span>
        <button id="nextMonth">＞</button>
      </div>
      <div class="total-hero">
        <div class="amount num" id="monthTotal">¥0</div>
        <div class="caption">今月の支出合計</div>
        <div class="compare" id="monthCompare"></div>
      </div>
      <div class="seg-toggle" id="summaryToggle">
        <button class="seg-btn active" data-mode="category">カテゴリ別</button>
        <button class="seg-btn" data-mode="store">店舗別</button>
      </div>
      <div id="categoryDonut"></div>
      <div id="summaryBars"></div>
    </div>
    <div class="card">
      <h2>明細</h2>
      <input type="text" id="entrySearch" placeholder="店舗名・品目・カテゴリで検索" style="margin-bottom:10px;">
      <div id="entryList"><div class="empty">この月の記録はありません</div></div>
    </div>
  </section>

  <!-- 年間タブ -->
  <section class="view" id="view-yearly">
    <div class="card">
      <div class="month-nav">
        <button id="prevYear">＜</button>
        <span class="label" id="yearLabel"></span>
        <button id="nextYear">＞</button>
      </div>
      <div class="total-hero">
        <div class="amount num" id="yearTotal">¥0</div>
        <div class="caption">年間の支出合計</div>
      </div>
    </div>
    <div class="card">
      <h2>月別推移</h2>
      <div id="yearlyMonthBars"></div>
    </div>
    <div class="card">
      <h2>カテゴリ別(年間)</h2>
      <div id="yearlyCategoryBars"></div>
    </div>
  </section>

  <!-- 設定タブ -->
  <section class="view" id="view-settings">
    <div class="card">
      <h2>接続設定</h2>
      <label class="field">GAS Web App URL</label>
      <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
      <div style="height:10px;"></div>
      <label class="field">あなたの名前(入力者として記録されます)</label>
      <input type="text" id="userNameInput" placeholder="例: 夫 / 妻 / 太郎">
      <button class="primary" id="saveSettingsBtn" style="margin-top:12px;">保存</button>
    </div>
    <div class="card">
      <h2>使い方</h2>
      <p style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin:0;">
        1. 「撮影」タブでレシートを撮影し解析<br>
        2. 品目・金額・大分類・小分類を確認し、必要なら修正<br>
        3. 保存すると夫婦どちらの端末からでも同じスプレッドシートに記録<br>
        4. 同じ日付・同じ合計金額のレシートが既にある場合は保存前に確認が出ます<br>
        5. 「一覧」タブでカテゴリ別・店舗別に支出を確認
      </p>
    </div>

    <div class="card">
      <h2>カテゴリ管理</h2>
      <div id="majorList"></div>
      <button class="plain" id="addMajorBtn" style="width:100%;margin-top:8px;">＋ 大分類を追加</button>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<nav class="tabbar">
  <button class="tab-btn active" data-view="view-capture"><span class="ic">📷</span>撮影</button>
  <button class="tab-btn" data-view="view-summary"><span class="ic">📊</span>一覧</button>
  <button class="tab-btn" data-view="view-yearly"><span class="ic">📈</span>年間</button>
  <button class="tab-btn" data-view="view-settings"><span class="ic">⚙️</span>設定</button>
</nav>

<script>
const DEFAULT_CATEGORY_TREE = {
  majors: ['食費','外食','日用品','交通','医療','娯楽','衣服','通信','住居','税','その他'],
  minorMap: {
    '食費': ['野菜','果物','肉','魚介','卵','乳製品','大豆製品','パン','米','麺類','調味料','惣菜・弁当','お菓子・デザート','冷凍食品','レトルト・インスタント','飲料','酒・アルコール','その他'],
    '外食': [], '日用品': [], '交通': [], '医療': [], '娯楽': [], '衣服': [], '通信': [], '住居': [], '税': [], 'その他': []
  }
};

const state = {
  gasUrl: localStorage.getItem('kakeibo_gasUrl') || '',
  userName: localStorage.getItem('kakeibo_userName') || '',
  categoryTree: DEFAULT_CATEGORY_TREE,
  currentMonth: new Date(),
  currentYear: new Date().getFullYear(),
  imageBase64: null,
  imageMime: null,
  parsedItems: [] // {date, store, name, price, majorCategory, minorCategory}
};

// ---------- タブ切替 ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.view).classList.add('active');
    if(btn.dataset.view==='view-summary') loadMonth();
    if(btn.dataset.view==='view-yearly') loadYearly();
  });
});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function callApi(action, payload){
  if(!state.gasUrl){
    toast('設定タブでGAS Web App URLを登録してください');
    throw new Error('no gas url');
  }
  const res = await fetch(state.gasUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // プリフライトを避けるためtext/plainで送信
    body: JSON.stringify(Object.assign({action}, payload))
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'API error');
  return json.data;
}

// ---------- 設定 ----------
document.getElementById('gasUrlInput').value = state.gasUrl;
document.getElementById('userNameInput').value = state.userName;
updateUserBadge();

document.getElementById('saveSettingsBtn').addEventListener('click', ()=>{
  state.gasUrl = document.getElementById('gasUrlInput').value.trim();
  state.userName = document.getElementById('userNameInput').value.trim();
  localStorage.setItem('kakeibo_gasUrl', state.gasUrl);
  localStorage.setItem('kakeibo_userName', state.userName);
  updateUserBadge();
  toast('設定を保存しました');
});

function updateUserBadge(){
  document.getElementById('userBadge').textContent = state.userName ? state.userName : '未設定';
}

// ---------- 撮影・OCR ----------
const fileInput = document.getElementById('fileInput');
const previewImg = document.getElementById('previewImg');
const captureHint = document.getElementById('captureHint');
const ocrBtn = document.getElementById('ocrBtn');

fileInput.addEventListener('change', ()=>{
  const file = fileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const dataUrl = reader.result;
    state.imageBase64 = dataUrl.split(',')[1];
    state.imageMime = file.type || 'image/jpeg';
    previewImg.src = dataUrl;
    previewImg.style.display = 'block';
    captureHint.style.display = 'none';
    ocrBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});

ocrBtn.addEventListener('click', async ()=>{
  document.getElementById('ocrSpinner').style.display = 'block';
  ocrBtn.disabled = true;
  try{
    const data = await callApi('ocr', {image: state.imageBase64, mimeType: state.imageMime});
    state.parsedItems = (data.items||[]).map(it=>({
      date: data.date || todayStr(),
      store: data.store || '',
      name: it.name || '品目',
      price: it.price || 0,
      majorCategory: it.majorCategory || 'その他',
      minorCategory: it.minorCategory || null
    }));
    document.getElementById('storeInput').value = data.store || '';
    renderItemsTable();
    checkTotalMismatch(data.receiptTotal);
    document.getElementById('reviewCard').style.display = 'block';
  }catch(err){
    toast('解析に失敗しました: ' + err.message);
  }finally{
    document.getElementById('ocrSpinner').style.display = 'none';
    ocrBtn.disabled = false;
  }
});

document.getElementById('manualEntryBtn').addEventListener('click', ()=>{
  state.parsedItems = [{
    date: todayStr(),
    store: '',
    name: '',
    price: 0,
    majorCategory: state.categoryTree.majors[0],
    minorCategory: null
  }];
  document.getElementById('storeInput').value = '';
  document.getElementById('mismatchBanner').style.display = 'none';
  renderItemsTable();
  document.getElementById('reviewCard').style.display = 'block';
  document.getElementById('reviewCard').scrollIntoView({behavior:'smooth', block:'start'});
});

async function ensureCategories(){
  try{
    const meta = await callApi('getCategories', {});
    if(meta && meta.majors && meta.majors.length) state.categoryTree = { majors: meta.majors, minorMap: meta.minorMap };
    renderManageUI();
  }catch(e){ /* GAS未設定時は既定カテゴリのまま */ }
}

// ---------- カテゴリ管理 ----------
function renderManageUI(){
  const majorList = document.getElementById('majorList');
  majorList.innerHTML = '';
  state.categoryTree.majors.forEach(major=>{
    const minors = state.categoryTree.minorMap[major] || [];
    const block = document.createElement('div');
    block.className = 'manage-major';
    const canDeleteMajor = major !== 'その他';
    block.innerHTML = `
      <div class="manage-row">
        <span class="name">${escapeHtml(major)}</span>
        <div class="manage-actions">
          <button class="plain" data-act="rename-major" data-major="${escapeHtml(major)}">名前変更</button>
          ${canDeleteMajor ? `<button class="danger" data-act="delete-major" data-major="${escapeHtml(major)}">削除</button>` : ''}
        </div>
      </div>
      ${minors.map(minor=>`
        <div class="manage-row minor">
          <span class="name">${escapeHtml(minor)}</span>
          <div class="manage-actions">
            <button class="plain" data-act="rename-minor" data-major="${escapeHtml(major)}" data-minor="${escapeHtml(minor)}">名前変更</button>
            <button class="danger" data-act="delete-minor" data-major="${escapeHtml(major)}" data-minor="${escapeHtml(minor)}">削除</button>
          </div>
        </div>
      `).join('')}
      <button class="manage-add-minor" data-act="add-minor" data-major="${escapeHtml(major)}">＋ ${escapeHtml(major)}に小分類を追加</button>
    `;
    majorList.appendChild(block);
  });

  majorList.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>handleManageAction(btn.dataset));
  });
}

document.getElementById('addMajorBtn').addEventListener('click', async ()=>{
  const name = prompt('新しい大分類の名前を入力してください');
  if(!name) return;
  try{
    await callApi('addMajor', {name});
    toast('追加しました');
    await ensureCategories();
  }catch(err){ toast('追加に失敗しました: ' + err.message); }
});

async function handleManageAction(ds){
  try{
    if(ds.act === 'rename-major'){
      const newName = prompt(`「${ds.major}」の新しい名前(既存の大分類名を入力すると統合されます)`, ds.major);
      if(!newName || newName === ds.major) return;
      const res = await callApi('renameMajor', {oldName: ds.major, newName});
      toast(`変更しました(${res.updatedRows}件の明細を更新)`);
      await ensureCategories();
    }else if(ds.act === 'delete-major'){
      if(!confirm(`「${ds.major}」を削除しますか?この大分類の明細は「その他」に移動します。`)) return;
      const res = await callApi('deleteMajor', {major: ds.major});
      toast(`削除しました(${res.updatedRows}件の明細を「その他」に移動)`);
      await ensureCategories();
    }else if(ds.act === 'rename-minor'){
      const newName = prompt(`「${ds.minor}」の新しい名前(既存の小分類名を入力すると統合されます)`, ds.minor);
      if(!newName || newName === ds.minor) return;
      const res = await callApi('renameMinor', {major: ds.major, oldMinor: ds.minor, newMinor: newName});
      toast(`変更しました(${res.updatedRows}件の明細を更新)`);
      await ensureCategories();
    }else if(ds.act === 'delete-minor'){
      if(!confirm(`「${ds.minor}」を削除しますか?該当する明細の小分類は空欄になります。`)) return;
      const res = await callApi('deleteMinor', {major: ds.major, minor: ds.minor});
      toast(`削除しました(${res.updatedRows}件の明細を更新)`);
      await ensureCategories();
    }else if(ds.act === 'add-minor'){
      const name = prompt(`「${ds.major}」に追加する小分類の名前`);
      if(!name) return;
      await callApi('addMinor', {major: ds.major, minor: name});
      toast('追加しました');
      await ensureCategories();
    }
  }catch(err){
    toast('操作に失敗しました: ' + err.message);
  }
}

function majorOptions(selected){
  let opts = state.categoryTree.majors.map(m=>
    `<option value="${escapeHtml(m)}" ${m===selected?'selected':''}>${escapeHtml(m)}</option>`
  ).join('');
  if(selected && state.categoryTree.majors.indexOf(selected)===-1){
    opts += `<option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)}</option>`;
  }
  return opts;
}

function minorOptions(major, selected){
  const minors = (state.categoryTree.minorMap && state.categoryTree.minorMap[major]) || [];
  if(minors.length === 0){
    return '<option value="">(小分類なし)</option>';
  }
  let opts = '<option value="">未選択</option>' + minors.map(m=>
    `<option value="${escapeHtml(m)}" ${m===selected?'selected':''}>${escapeHtml(m)}</option>`
  ).join('');
  if(selected && minors.indexOf(selected)===-1){
    opts += `<option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)}</option>`;
  }
  return opts;
}

function renderItemsTable(){
  const body = document.getElementById('itemsBody');
  body.innerHTML = '';
  state.parsedItems.forEach((item, idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="date" value="${item.date}" data-idx="${idx}" data-f="date"></td>
      <td><input type="text" value="${escapeHtml(item.name)}" data-idx="${idx}" data-f="name"></td>
      <td><input type="number" value="${item.price}" data-idx="${idx}" data-f="price"></td>
      <td><select data-idx="${idx}" data-f="majorCategory">${majorOptions(item.majorCategory)}</select></td>
      <td><select data-idx="${idx}" data-f="minorCategory">${minorOptions(item.majorCategory, item.minorCategory)}</select></td>
      <td><button class="row-del" data-idx="${idx}">×</button></td>
    `;
    body.appendChild(tr);
  });
  body.querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('change', ()=>{
      const idx = Number(el.dataset.idx);
      const f = el.dataset.f;
      if(f==='price'){
        state.parsedItems[idx][f] = Number(el.value);
      }else{
        state.parsedItems[idx][f] = el.value;
      }
      if(f==='majorCategory'){
        state.parsedItems[idx].minorCategory = null;
        renderItemsTable();
      }
    });
  });
  body.querySelectorAll('.row-del').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.parsedItems.splice(Number(el.dataset.idx), 1);
      renderItemsTable();
    });
  });
}

document.getElementById('addRowBtn').addEventListener('click', ()=>{
  state.parsedItems.push({
    date: todayStr(),
    store: document.getElementById('storeInput').value,
    name:'',
    price:0,
    majorCategory: state.categoryTree.majors[0],
    minorCategory: null
  });
  renderItemsTable();
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  doSave(false);
});

async function doSave(confirmDuplicate){
  const store = document.getElementById('storeInput').value;
  const items = state.parsedItems.map(it=>Object.assign({}, it, {store}));
  if(items.length===0){ toast('品目がありません'); return; }
  try{
    const res = await callApi('save', {items, user: state.userName, confirmDuplicate});
    if(res.duplicate){
      const m = res.match;
      const proceed = confirm(
        `${m.date} に合計¥${m.total.toLocaleString()}(${m.itemCount}品目)のレシートが` +
        `既に登録されています。二重登録の可能性がありますが、このまま保存しますか?`
      );
      if(proceed){
        doSave(true);
      }
      return;
    }
    toast(`${res.saved}件保存しました`);
    resetCapture();
    ensureCategories(); // 新しいカテゴリが増えていれば候補を更新
  }catch(err){
    toast('保存に失敗しました: ' + err.message);
  }
}

function resetCapture(){
  state.parsedItems = [];
  state.imageBase64 = null;
  previewImg.style.display='none';
  captureHint.style.display='block';
  ocrBtn.disabled = true;
  fileInput.value = '';
  document.getElementById('reviewCard').style.display = 'none';
}

function checkTotalMismatch(receiptTotal){
  const banner = document.getElementById('mismatchBanner');
  const sum = state.parsedItems.reduce((s,it)=>s + (Number(it.price)||0), 0);
  if(receiptTotal===null || receiptTotal===undefined || receiptTotal===''){
    banner.style.display = 'none';
    return;
  }
  const total = Number(receiptTotal);
  if(Math.abs(total - sum) > 1){
    banner.textContent = `⚠ 品目の合計(¥${sum.toLocaleString()})とレシートの合計金額(¥${total.toLocaleString()})が一致しません。金額を確認してください。`;
    banner.style.display = 'block';
  }else{
    banner.style.display = 'none';
  }
}

// ---------- 一覧・集計 ----------
let lastMonthlyData = null;
let summaryMode = 'category';

document.getElementById('summaryToggle').addEventListener('click', (e)=>{
  const btn = e.target.closest('.seg-btn');
  if(!btn) return;
  summaryMode = btn.dataset.mode;
  document.querySelectorAll('#summaryToggle .seg-btn').forEach(b=>b.classList.toggle('active', b===btn));
  if(lastMonthlyData) renderBars(lastMonthlyData);
});

document.getElementById('prevMonth').addEventListener('click', ()=>{
  state.currentMonth.setMonth(state.currentMonth.getMonth()-1);
  loadMonth();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  state.currentMonth.setMonth(state.currentMonth.getMonth()+1);
  loadMonth();
});

async function loadMonth(){
  const ym = monthStr(state.currentMonth);
  document.getElementById('monthLabel').textContent =
    `${state.currentMonth.getFullYear()}年${state.currentMonth.getMonth()+1}月`;
  try{
    const data = await callApi('getMonthly', {yearMonth: ym});
    renderSummary(data);
  }catch(err){
    toast('取得に失敗しました: ' + err.message);
  }
}

function renderSummary(data){
  lastMonthlyData = data;
  const viewedYearMonth = monthStr(state.currentMonth);
  document.getElementById('monthTotal').textContent = '¥' + (data.total||0).toLocaleString();
  renderMonthCompare(data);

  renderBars(data);
  renderEntryList(data, viewedYearMonth, document.getElementById('entrySearch').value);
}

function renderEntryList(data, viewedYearMonth, searchTerm){
  const term = (searchTerm||'').trim().toLowerCase();
  const allItems = data.items||[];
  const filtered = term ? allItems.filter(item=>{
    const haystack = [item.name, item.store, item.majorCategory, item.minorCategory, item.user]
      .filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(term);
  }) : allItems;

  const list = document.getElementById('entryList');
  list.innerHTML = '';
  filtered.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'entry';
    const catLabel = item.minorCategory
      ? `${escapeHtml(item.majorCategory)} ＞ ${escapeHtml(item.minorCategory)}`
      : escapeHtml(item.majorCategory);
    row.innerHTML = `
      <div>
        <div>${escapeHtml(item.name)}</div>
        <div class="meta">${item.date} ・ ${escapeHtml(item.store||'')} ・ ${catLabel}${item.user? ' ・ '+escapeHtml(item.user):''}</div>
      </div>
      <div style="text-align:right;">
        <div class="amount num">¥${item.price.toLocaleString()}</div>
        <button class="del" data-row="${item.rowIndex}">削除</button>
      </div>
    `;
    list.appendChild(row);
  });
  if(filtered.length===0){
    list.innerHTML = `<div class="empty">${term ? '一致する明細がありません' : 'この月の記録はありません'}</div>`;
  }
  list.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('この明細を削除しますか?')) return;
      try{
        await callApi('deleteRow', {yearMonth: viewedYearMonth, rowIndex: Number(btn.dataset.row)});
        loadMonth();
      }catch(err){
        toast('削除に失敗しました');
      }
    });
  });
}

document.getElementById('entrySearch').addEventListener('input', (e)=>{
  if(lastMonthlyData) renderEntryList(lastMonthlyData, monthStr(state.currentMonth), e.target.value);
});

function renderMonthCompare(data){
  const el = document.getElementById('monthCompare');
  if(data.previousTotal === null || data.previousTotal === undefined){
    el.textContent = '';
    el.className = 'compare';
    return;
  }
  const diff = data.diff || 0;
  const sign = diff > 0 ? '+' : diff < 0 ? '−' : '';
  const absDiff = Math.abs(diff);
  let percentText = '';
  if(data.diffPercent !== null && data.diffPercent !== undefined){
    const p = data.diffPercent;
    percentText = ` (${p>0?'+':''}${p}%)`;
  }
  if(diff === 0){
    el.textContent = `先月と同じ ・ 先月¥${data.previousTotal.toLocaleString()}`;
    el.className = 'compare flat';
  }else{
    el.textContent = `先月比 ${sign}¥${absDiff.toLocaleString()}${percentText} ・ 先月¥${data.previousTotal.toLocaleString()}`;
    el.className = 'compare ' + (diff > 0 ? 'up' : 'down');
  }
}

const DONUT_COLORS = ['#2F5D50','#C97B4A','#4A7C8C','#B33F3F','#8C6E4A','#5B7B4A','#7A5C99','#C9A227','#4A5B99','#A65C85','#6E8C4A','#9C4A4A'];

function renderCategoryDonut(entries, total){
  const container = document.getElementById('categoryDonut');
  if(!entries.length){
    container.innerHTML = '';
    return;
  }
  const size = 140, r = 52, cx = 70, cy = 70, stroke = 22;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  let circles = '';
  entries.forEach(([label, amount], i)=>{
    const frac = total > 0 ? amount / total : 0;
    const dash = frac * circumference;
    const color = DONUT_COLORS[i % DONUT_COLORS.length];
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${(circumference-dash).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
  });
  const svg = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${circles}</svg>`;
  const legend = entries.map(([label, amount], i)=>{
    const pct = total > 0 ? Math.round(amount/total*100) : 0;
    return `
      <div class="donut-legend-row">
        <span class="dot" style="background:${DONUT_COLORS[i % DONUT_COLORS.length]}"></span>
        <span class="label" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
        <span class="pct">${pct}%</span>
      </div>
    `;
  }).join('');
  container.innerHTML = `
    <div class="donut-row">
      <div class="donut-wrap">
        ${svg}
        <div class="donut-center">
          <div class="amount num">¥${total.toLocaleString()}</div>
          <div class="caption">合計</div>
        </div>
      </div>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
}

function renderBars(data){
  const source = summaryMode === 'store' ? (data.storeSummary||{}) : (data.summary||{});
  const entries = Object.entries(source).sort((a,b)=>b[1]-a[1]);

  if(summaryMode === 'category'){
    renderCategoryDonut(entries, data.total||0);
  }else{
    document.getElementById('categoryDonut').innerHTML = '';
  }

  const bars = document.getElementById('summaryBars');
  bars.innerHTML = '';
  const max = entries.length ? entries[0][1] : 1;
  entries.forEach(([label, amount])=>{
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(amount/max*100).toFixed(0)}%"></div></div>
      <div class="bar-amount num">¥${amount.toLocaleString()}</div>
    `;
    bars.appendChild(row);
  });
  if(entries.length===0){
    bars.innerHTML = '<div class="empty">この月の記録はありません</div>';
  }
}

// ---------- 年間サマリー ----------
document.getElementById('prevYear').addEventListener('click', ()=>{
  state.currentYear -= 1;
  loadYearly();
});
document.getElementById('nextYear').addEventListener('click', ()=>{
  state.currentYear += 1;
  loadYearly();
});

async function loadYearly(){
  document.getElementById('yearLabel').textContent = `${state.currentYear}年`;
  try{
    const data = await callApi('getYearly', {year: String(state.currentYear)});
    renderYearly(data);
  }catch(err){
    toast('取得に失敗しました: ' + err.message);
  }
}

function renderYearly(data){
  document.getElementById('yearTotal').textContent = '¥' + (data.yearTotal||0).toLocaleString();

  // 月別推移(時系列順、最大値に対する相対バー)
  const monthBars = document.getElementById('yearlyMonthBars');
  monthBars.innerHTML = '';
  const months = data.months || [];
  const max = Math.max.apply(null, months.map(m=>m.total).concat([1]));
  months.forEach(m=>{
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${Number(m.month)}月</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(m.total/max*100).toFixed(0)}%"></div></div>
      <div class="bar-amount num">¥${m.total.toLocaleString()}</div>
    `;
    monthBars.appendChild(row);
  });

  // カテゴリ別年間合計(金額の多い順)
  const catBars = document.getElementById('yearlyCategoryBars');
  catBars.innerHTML = '';
  const entries = Object.entries(data.categorySummary||{}).sort((a,b)=>b[1]-a[1]);
  const catMax = entries.length ? entries[0][1] : 1;
  entries.forEach(([label, amount])=>{
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(amount/catMax*100).toFixed(0)}%"></div></div>
      <div class="bar-amount num">¥${amount.toLocaleString()}</div>
    `;
    catBars.appendChild(row);
  });
  if(entries.length===0){
    catBars.innerHTML = '<div class="empty">この年の記録はありません</div>';
  }
}

function monthStr(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// 初期化
ensureCategories();

// PWA: Service Worker登録
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
